# ============================================
# API GATEWAY CONFIGURATION
# ============================================

spring.application.name=api-gateway
server.port=8080

# ============================================
# EUREKA CLIENT CONFIGURATION
# ============================================

eureka.client.register-with-eureka=true
eureka.client.fetch-registry=true
eureka.client.service-url.defaultZone=http://localhost:8761/eureka/
eureka.instance.prefer-ip-address=true

# ============================================
# ROUTES CONFIGURATION
# ============================================

# Route 1: Auth endpoints ? User Service
spring.cloud.gateway.server.webflux.routes[0].id=user-service-auth
spring.cloud.gateway.server.webflux.routes[0].uri=lb://user-service
spring.cloud.gateway.server.webflux.routes[0].predicates[0]=Path=/api/v1/auth/**

# Route 2: User endpoints ? User Service
spring.cloud.gateway.server.webflux.routes[1].id=user-service-users
spring.cloud.gateway.server.webflux.routes[1].uri=lb://user-service
spring.cloud.gateway.server.webflux.routes[1].predicates[0]=Path=/api/v1/users/**

# Route 3: Admin user endpoints ? User Service
spring.cloud.gateway.server.webflux.routes[2].id=user-service-admin-users
spring.cloud.gateway.server.webflux.routes[2].uri=lb://user-service
spring.cloud.gateway.server.webflux.routes[2].predicates[0]=Path=/api/v1/admin/users/**

# Route 4: Product public endpoints ? Product Service
spring.cloud.gateway.server.webflux.routes[3].id=product-service-products
spring.cloud.gateway.server.webflux.routes[3].uri=lb://product-service
spring.cloud.gateway.server.webflux.routes[3].predicates[0]=Path=/api/v1/products/**

# Route 5: Category public endpoints ? Product Service
spring.cloud.gateway.server.webflux.routes[4].id=product-service-categories
spring.cloud.gateway.server.webflux.routes[4].uri=lb://product-service
spring.cloud.gateway.server.webflux.routes[4].predicates[0]=Path=/api/v1/categories/**

# Route 6: Admin product endpoints ? Product Service
spring.cloud.gateway.server.webflux.routes[5].id=product-service-admin-products
spring.cloud.gateway.server.webflux.routes[5].uri=lb://product-service
spring.cloud.gateway.server.webflux.routes[5].predicates[0]=Path=/api/v1/admin/products/**

# Route 7: Admin category endpoints ? Product Service
spring.cloud.gateway.server.webflux.routes[6].id=product-service-admin-categories
spring.cloud.gateway.server.webflux.routes[6].uri=lb://product-service
spring.cloud.gateway.server.webflux.routes[6].predicates[0]=Path=/api/v1/admin/categories/**

# Route 8: Cart endpoints ? Order Service
spring.cloud.gateway.server.webflux.routes[7].id=order-service-cart
spring.cloud.gateway.server.webflux.routes[7].uri=lb://order-service
spring.cloud.gateway.server.webflux.routes[7].predicates[0]=Path=/api/v1/cart/**

# Route 9: Order endpoints ? Order Service
spring.cloud.gateway.server.webflux.routes[8].id=order-service-orders
spring.cloud.gateway.server.webflux.routes[8].uri=lb://order-service
spring.cloud.gateway.server.webflux.routes[8].predicates[0]=Path=/api/v1/orders/**

# Route 10: Payment endpoints ? Payment Service
spring.cloud.gateway.server.webflux.routes[9].id=payment-service-payments
spring.cloud.gateway.server.webflux.routes[9].uri=lb://payment-service
spring.cloud.gateway.server.webflux.routes[9].predicates[0]=Path=/api/v1/payments/**

# ============================================
# CORS CONFIGURATION (Updated keys)
# ============================================

spring.cloud.gateway.server.webflux.globalcors.cors-configurations.[/**].allowed-origins=http://localhost:5173
spring.cloud.gateway.server.webflux.globalcors.cors-configurations.[/**].allowed-methods=GET,POST,PUT,DELETE,PATCH,OPTIONS
spring.cloud.gateway.server.webflux.globalcors.cors-configurations.[/**].allowed-headers=*
spring.cloud.gateway.server.webflux.globalcors.cors-configurations.[/**].allow-credentials=true

# ============================================
# ACTUATOR
# ============================================

management.endpoints.web.exposure.include=health,info
management.endpoint.health.show-details=always

# ============================================
# LOGGING
# ============================================

logging.level.org.springframework.cloud.gateway=DEBUG
logging.level.reactor.netty=INFO

# Increase Gateway timeout
spring.cloud.gateway.server.webflux.httpclient.connect-timeout=30000
spring.cloud.gateway.server.webflux.httpclient.response-timeout=30s