# ============================================
# API GATEWAY CONFIGURATION
# ============================================

spring.application.name=api-gateway
server.port=8080

# ============================================
# EUREKA CLIENT CONFIGURATION
# ============================================

eureka.client.register-with-eureka=true
eureka.client.fetch-registry=true
eureka.client.service-url.defaultZone=http://localhost:8761/eureka/
eureka.instance.prefer-ip-address=true

# ============================================
# ROUTES CONFIGURATION
# ============================================

# Route 1: Auth endpoints ? User Service
spring.cloud.gateway.routes[0].id=user-service-auth
spring.cloud.gateway.routes[0].uri=lb://user-service
spring.cloud.gateway.routes[0].predicates[0]=Path=/api/v1/auth/**

# Route 2: User endpoints ? User Service
spring.cloud.gateway.routes[1].id=user-service-users
spring.cloud.gateway.routes[1].uri=lb://user-service
spring.cloud.gateway.routes[1].predicates[0]=Path=/api/v1/users/**

# Route 3: Admin user endpoints ? User Service
spring.cloud.gateway.routes[2].id=user-service-admin
spring.cloud.gateway.routes[2].uri=lb://user-service
spring.cloud.gateway.routes[2].predicates[0]=Path=/api/v1/admin/users/**

# ============================================
# CORS CONFIGURATION
# ============================================

spring.cloud.gateway.globalcors.cors-configurations.[/**].allowed-origins=http://localhost:3000
spring.cloud.gateway.globalcors.cors-configurations.[/**].allowed-methods=GET,POST,PUT,DELETE,PATCH,OPTIONS
spring.cloud.gateway.globalcors.cors-configurations.[/**].allowed-headers=*
spring.cloud.gateway.globalcors.cors-configurations.[/**].allow-credentials=true

# ============================================
# ACTUATOR
# ============================================

management.endpoints.web.exposure.include=health,info,gateway
management.endpoint.health.show-details=always
management.endpoint.gateway.enabled=true

# ============================================
# LOGGING
# ============================================

logging.level.org.springframework.cloud.gateway=DEBUG
logging.level.reactor.netty=INFO