# ============================================
# ORDER SERVICE CONFIGURATION
# ============================================

spring.application.name=order-service
server.port=${PORT:8083}

# ============================================
# MYSQL DATABASE CONFIGURATION
# ============================================

spring.datasource.url=jdbc:mysql://${DB_HOST}:${DB_PORT}/${DB_NAME}?createDatabaseIfNotExist=true&useSSL=false&serverTimezone=UTC&allowPublicKeyRetrieval=true
spring.datasource.username=root
spring.datasource.password=${DB_PASSWORD}
spring.datasource.driver-class-name=com.mysql.cj.jdbc.Driver

# ============================================
# JPA / HIBERNATE CONFIGURATION
# ============================================

spring.jpa.hibernate.ddl-auto=update
spring.jpa.show-sql=true
spring.jpa.properties.hibernate.format_sql=true
spring.jpa.properties.hibernate.dialect=org.hibernate.dialect.MySQLDialect
spring.jpa.open-in-view=false

# ============================================
# EUREKA CLIENT CONFIGURATION
# ============================================

eureka.client.register-with-eureka=true
eureka.client.fetch-registry=true
eureka.client.service-url.defaultZone=${EUREKA_URL}
eureka.instance.prefer-ip-address=true

# ============================================
# JWT CONFIGURATION
# ============================================

jwt.secret=${JWT_SECRET}

# ============================================
# OPENFEIGN CONFIGURATION
# ============================================

spring.cloud.openfeign.client.config.default.connect-timeout=30000
spring.cloud.openfeign.client.config.default.read-timeout=30000

# ============================================
# RESILIENCE4J CIRCUIT BREAKER
# ============================================

resilience4j.circuitbreaker.instances.product-service.sliding-window-size=10
resilience4j.circuitbreaker.instances.product-service.failure-rate-threshold=50
resilience4j.circuitbreaker.instances.product-service.wait-duration-in-open-state=30s
resilience4j.circuitbreaker.instances.product-service.permitted-number-of-calls-in-half-open-state=3
resilience4j.circuitbreaker.instances.product-service.automatic-transition-from-open-to-half-open-enabled=true

# Disable Feign circuit breaker for development
spring.cloud.openfeign.circuitbreaker.enabled=false

# ============================================
# ACTUATOR
# ============================================

management.endpoints.web.exposure.include=health,info,circuitbreakers
management.endpoint.health.show-details=always
management.health.circuitbreakers.enabled=true

# ============================================
# LOGGING
# ============================================

logging.level.com.ecommerce.order=DEBUG
logging.level.org.springframework.security=INFO
logging.level.io.github.resilience4j=DEBUG

# Increase timeout for Feign clients
resilience4j.timelimiter.instances.product-service.timeout-duration=30s
resilience4j.timelimiter.instances.user-service.timeout-duration=30s
