# ============================================
# EUREKA SERVER CONFIGURATION
# ============================================

# Application name - other services will see this name
spring.application.name=eureka-server

# Port where Eureka Server will run
server.port=${PORT:8761}

# ============================================
# EUREKA SPECIFIC SETTINGS
# ============================================

# Don't register Eureka Server with itself
# (Eureka Server is NOT a client, it IS the server)
eureka.client.register-with-eureka=false

# Don't fetch registry from itself
# (It maintains the registry, doesn't need to fetch it)
eureka.client.fetch-registry=false

# URL where Eureka Server is hosted
# Other services will use this URL to register themselves
eureka.client.service-url.defaultZone=http://localhost:8761/eureka/

# ============================================
# EUREKA SERVER BEHAVIOUR
# ============================================

# How long to wait before removing a service
# that stopped sending heartbeats (in seconds)
eureka.server.eviction-interval-timer-in-ms=3000

# ============================================
# ACTUATOR - HEALTH CHECK
# ============================================

# Expose health and info endpoints
management.endpoints.web.exposure.include=health,info

# Show full health details
management.endpoint.health.show-details=always

# ============================================
# LOGGING
# ============================================

# Show logs for Eureka
logging.level.com.netflix.eureka=INFO
logging.level.com.netflix.discovery=INFO