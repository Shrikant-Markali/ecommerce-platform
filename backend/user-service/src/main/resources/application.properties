# ============================================
# USER SERVICE CONFIGURATION
# ============================================

# Application name - this is how Eureka will identify this service
spring.application.name=user-service

# Port where User Service will run
server.port=8081

# ============================================
# MYSQL DATABASE CONFIGURATION
# ============================================

# Database URL
spring.datasource.url=jdbc:mysql://${DB_HOST}:${DB_PORT}/${DB_NAME}?createDatabaseIfNotExist=true&useSSL=false&serverTimezone=UTC&allowPublicKeyRetrieval=true

# Your MySQL username (usually root for local)
spring.datasource.username=root

# Your MySQL password
spring.datasource.password=${DB_PASSWORD}

# MySQL Driver
spring.datasource.driver-class-name=com.mysql.cj.jdbc.Driver

# ============================================
# JPA / HIBERNATE CONFIGURATION
# ============================================

# Auto create/update tables based on our Entity classes
# 'update' = creates tables if not exist, updates if schema changes
spring.jpa.hibernate.ddl-auto=update

# Show SQL queries in console (helpful during development)
spring.jpa.show-sql=true

# Format SQL nicely in console
spring.jpa.properties.hibernate.format_sql=true

# MySQL dialect - tells Hibernate we are using MySQL
spring.jpa.properties.hibernate.dialect=org.hibernate.dialect.MySQLDialect

# ============================================
# EUREKA CLIENT CONFIGURATION
# ============================================

# Register this service with Eureka Server
eureka.client.register-with-eureka=true

# Fetch registry from Eureka (to discover other services)
eureka.client.fetch-registry=true

# Eureka Server URL
eureka.client.service-url.defaultZone=${EUREKA_URL}

# How this service appears in Eureka Dashboard
eureka.instance.prefer-ip-address=true

# ============================================
# JWT CONFIGURATION
# ============================================

# Secret key for signing JWT tokens (keep this secret!)
jwt.secret=${JWT_SECRET}
jwt.access-token-expiration=900000
jwt.refresh-token-expiration=604800000

# ============================================
# ACTUATOR - HEALTH CHECK
# ============================================

management.endpoints.web.exposure.include=health,info
management.endpoint.health.show-details=always

# ============================================
# LOGGING
# ============================================

logging.level.com.ecommerce.user=DEBUG
logging.level.org.springframework.security=INFO

# ============================================
# JVM OPTIMIZATION (8GB RAM)
# ============================================

spring.jpa.open-in-view=false