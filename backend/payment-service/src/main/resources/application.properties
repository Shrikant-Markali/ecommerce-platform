# ============================================
# PAYMENT SERVICE CONFIGURATION
# ============================================

spring.application.name=payment-service
server.port=8084

# ============================================
# MYSQL DATABASE CONFIGURATION
# ============================================

spring.datasource.url=jdbc:mysql://localhost:3306/payments_db?createDatabaseIfNotExist=true&useSSL=false&serverTimezone=UTC&allowPublicKeyRetrieval=true
spring.datasource.username=root
spring.datasource.password=${DB_PASSWORD}
spring.datasource.driver-class-name=com.mysql.cj.jdbc.Driver

# ============================================
# JPA / HIBERNATE CONFIGURATION
# ============================================

spring.jpa.hibernate.ddl-auto=update
spring.jpa.show-sql=true
spring.jpa.properties.hibernate.format_sql=true
spring.jpa.properties.hibernate.dialect=org.hibernate.dialect.MySQLDialect
spring.jpa.open-in-view=false

# ============================================
# EUREKA CLIENT CONFIGURATION
# ============================================

eureka.client.register-with-eureka=true
eureka.client.fetch-registry=true
eureka.client.service-url.defaultZone=http://localhost:8761/eureka/
eureka.instance.prefer-ip-address=true

# ============================================
# JWT CONFIGURATION
# ============================================

jwt.secret=${JWT_SECRET}

# ============================================
# PAYPAL CONFIGURATION
# ============================================

paypal.mode=${PAYPAL_MODE}
paypal.client-id=${PAYPAL_CLIENT_ID}
paypal.client-secret=${PAYPAL_CLIENT_SECRET}
paypal.base-url=${PAYPAL_BASE_URL}

# Success and Cancel URLs (where PayPal redirects after payment)
paypal.success-url=http://localhost:8080/api/v1/payments/success
paypal.cancel-url=http://localhost:8080/api/v1/payments/cancel

# ============================================
# OPENFEIGN CONFIGURATION
# ============================================

spring.cloud.openfeign.client.config.default.connect-timeout=5000
spring.cloud.openfeign.client.config.default.read-timeout=5000
spring.cloud.openfeign.circuitbreaker.enabled=true

# ============================================
# ACTUATOR
# ============================================

management.endpoints.web.exposure.include=health,info
management.endpoint.health.show-details=always

# ============================================
# LOGGING
# ============================================

logging.level.com.ecommerce.payment=DEBUG
logging.level.org.springframework.security=INFO